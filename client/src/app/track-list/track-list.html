<!-- src/app/track-list/track-list.html -->
<div class="search-wrapper">
  <span class="search-icon">🔍</span>
  <input
    type="search"
    placeholder="Rechercher un titre ou un artiste…"
    [value]="searchTerm()"
    (input)="searchTerm.set($any($event.target).value)" />
</div>

<section class="grid">
  @for (track of filteredTracks(); track track.id) {
    <app-track-card
    [track]="track"
    [active]="track.id === selectedId()"
    (select)="selectedId.set($event.id)" />
  } @empty {
    <p class="empty">Aucun résultat pour « {{ searchTerm() }} ».</p>
  }
</section>
