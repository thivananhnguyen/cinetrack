<!-- src/app/track-list/track-list.html -->
<div class="search-wrapper">
  <span class="search-icon">🔍</span>
  <input
    type="search"
    aria-label="Rechercher un morceau"
    placeholder="Rechercher un titre, artiste, album…"
    [value]="searchTerm()"
    (input)="searchTerm.set($any($event.target).value)" />
</div>

@switch (state().status) {
  @case ('loading') {
    <p class="hint">Chargement…</p>
  }
  @case ('error') {
    <div class="error-state" role="alert">⚠ Erreur lors du chargement. Veuillez réessayer.</div>
  }
  @case ('loaded') {
    <section class="grid">
      @for (track of $any(state()).tracks; track track.id) {
        <app-track-card
        [track]="track"
        [active]="track.id === selectedId()"
        (select)="selectedId.set($event.id)" />
      } @empty {
        <p class="empty">Aucun résultat pour « {{ searchTerm() }} ».</p>
      }
    </section>
  }
}
