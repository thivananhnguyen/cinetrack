<div class="login-page">
  <form class="login-form" novalidate (submit)="onSubmit($event)">
    <h2>🔐 Connexion</h2>

    @if (error()) {
      <div class="error-banner" role="alert">{{ error() }}</div>
    }

    <div class="field">
      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        autocomplete="email"
        placeholder="demo&#64;ipssi.fr"
        [value]="email()"
        [attr.aria-invalid]="(emailTouched() && !email().trim()) || emailInvalid()"
        (input)="email.set($any($event.target).value)"
        (blur)="emailTouched.set(true)" />
      @if (emailTouched() && !email().trim()) {
        <small class="error">L'email est requis.</small>
      } @else if (emailInvalid()) {
        <small class="error">Format d'email invalide.</small>
      }
    </div>

    <div class="field">
      <label for="password">Mot de passe</label>
      <input
        id="password"
        type="password"
        autocomplete="current-password"
        placeholder="••••••••"
        [value]="password()"
        [attr.aria-invalid]="passwordTouched() && !password()"
        (input)="password.set($any($event.target).value)"
        (blur)="passwordTouched.set(true)" />
      @if (passwordTouched() && !password()) {
        <small class="error">Le mot de passe est requis.</small>
      }
    </div>

    <button type="submit" [disabled]="loading() || !email() || !password() || emailInvalid()">
      @if (loading()) {
        Connexion…
      } @else {
        Se connecter
      }
    </button>
  </form>
</div>
